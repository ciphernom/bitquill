<!-- Main Application Script -->
    <script>
    /**
     * BitQuill Application
     * A secure rich text editor with Merkle tree integrity and edit pattern analysis
     */

    // Declare Delta globally
    let Delta;

    class EditAnalyzer {
        constructor() {
            this.editHistory = [];
            
            this.thresholds = {
                // Basic human typing parameters
                baseTypingInterval: 100,      // Baseline IKI (inter-key interval) in ms
                thinkingTime: 500,            // Average pause for thinking in ms
                wordBoundaryPause: 200,       // Natural pause between words in ms
                
                // Pattern detection
                fastBurstThreshold: 80,       // Fastest acceptable typing interval in ms
                burstVariance: 20,            // Expected variance in typing speed
                consistentPatternWindow: 10,  // Number of keystrokes to check for patterns
                maxConsistentCount: 5,        // Maximum allowable identical intervals
                
                // Text characteristics
                maxWordLength: 15,            // Longest typical English word
                commonWordLengths: [3, 4, 5], // Most common English word lengths
                typicalLineLength: 80,        // Average characters per line
                
                // Statistics tracking
                windowSize: 50,               // Rolling window for analysis
                minSampleSize: 5              // Minimum samples for pattern detection
            };
            
            this.intervalHistory = [];        // Store timing between edits
            this.patternBuffer = [];          // Recent typing patterns
            this.lastWordBoundary = 0;        // Track word breaks
        }

        recordEdit(newDelta, prevDelta, timestamp) {
            const timeSinceLastEdit = this.editHistory.length > 0 ? 
                timestamp - this.editHistory[this.editHistory.length - 1].timestamp : null;

            const metrics = {
                timestamp,
                delta: newDelta,
                changeSize: this.calculateDeltaSize(newDelta),
                timeSinceLastEdit
            };

            // Analyze the typing pattern
            if (timeSinceLastEdit !== null) {
                const isNaturalTyping = this.analyzeTypingPattern(timeSinceLastEdit);
                if (!isNaturalTyping) {
                    return {
                        isValid: false,
                        patterns: ['Unnatural typing pattern detected']
                    };
                }
            }

            this.editHistory.push(metrics);
            return this.analyzeEdit(metrics);
        }

        calculateDeltaSize(delta) {
            let size = 0;
            delta.ops.forEach(op => {
                if (op.insert) {
                    if (typeof op.insert === 'string') {
                        size += op.insert.length;
                    } else {
                        size += 1; // For embeds like images
                    }
                }
            });
            return size;
        }

        analyzeTypingPattern(newInterval) {
            // Store interval
            this.intervalHistory.push(newInterval);
            if (this.intervalHistory.length > this.thresholds.windowSize) {
                this.intervalHistory.shift();
            }

            // Calculate geometric mean of recent intervals
            const recentIntervals = this.intervalHistory.slice(-this.thresholds.minSampleSize);
            if (recentIntervals.length < this.thresholds.minSampleSize) return true;

            const logSum = recentIntervals.reduce((sum, interval) => {
                return sum + Math.log(Math.max(interval, 1));
            }, 0);
            const geometricMean = Math.exp(logSum / recentIntervals.length);

            // Check for inhuman patterns
            const tooFast = geometricMean < this.thresholds.fastBurstThreshold;
            const tooConsistent = this.checkConsistency(recentIntervals);
            const noNaturalPauses = this.checkPausePattern();

            return !tooFast && !tooConsistent && !noNaturalPauses;
        }

        checkConsistency(intervals) {
            let consistentCount = 1;
            const variance = this.thresholds.burstVariance;
            
            for (let i = 1; i < intervals.length; i++) {
                if (Math.abs(intervals[i] - intervals[i-1]) < variance) {
                    consistentCount++;
                    if (consistentCount > this.thresholds.maxConsistentCount) {
                        return true;
                    }
                } else {
                    consistentCount = 1;
                }
            }
            return false;
        }

        checkPausePattern() {
            const recentTotal = this.intervalHistory.slice(-this.thresholds.windowSize)
                .reduce((sum, interval) => sum + interval, 0);
            
            if (recentTotal === 0) return false;

            const pauseCount = this.intervalHistory.slice(-this.thresholds.windowSize)
                .filter(interval => interval > this.thresholds.wordBoundaryPause)
                .length;

            // Should have natural pauses every few characters
            return pauseCount < (this.thresholds.windowSize / this.thresholds.maxWordLength);
        }

        analyzeEdit(metrics) {
            const suspiciousPatterns = [];

            // Check for paste operations or bulk edits
            if (metrics.changeSize > this.thresholds.maxWordLength) {
                suspiciousPatterns.push('Large content change detected');
            }

            // Check if content changed without proper typing interval
            if (metrics.changeSize > 1 && metrics.timeSinceLastEdit < this.thresholds.baseTypingInterval) {
                suspiciousPatterns.push('Content changed too quickly');
            }

            return {
                isValid: suspiciousPatterns.length === 0,
                patterns: suspiciousPatterns
            };
        }

        getEditStats() {
            if (this.editHistory.length === 0) return null;

            const totalEdits = this.editHistory.length;
            const totalTime = this.editHistory[totalEdits - 1].timestamp - this.editHistory[0].timestamp;
            const totalChars = this.editHistory.reduce((sum, edit) => sum + edit.changeSize, 0);
            
            // Calculate geometric mean of intervals
            const intervals = this.intervalHistory.filter(interval => interval > 0);
            const geometricMean = intervals.length > 0 ? 
                Math.exp(intervals.reduce((sum, interval) => sum + Math.log(interval), 0) / intervals.length) : 
                null;

            return {
                totalEdits,
                averageInterval: totalEdits > 1 ? totalTime / (totalEdits - 1) : null,
                geometricMeanInterval: geometricMean,
                charsPerMinute: totalTime > 0 ? (totalChars / totalTime) * 60000 : 0,
                totalChars
            };
        }
    }

    class MerkleNode {
        constructor(hash, delta, metadata = null, left = null, right = null) {
            this.hash = hash;
            this.delta = delta;    // Store delta instead of content
            this.metadata = metadata;  // Stores timestamp, PoW results, edit stats
            this.left = left;
            this.right = right;
        }
    }

    class EnhancedMerkleTree {
        constructor(DeltaClass) {
            this.leaves = [];
            this.root = null;
            this.pendingTimestamps = new Map();
            this.documentState = new DeltaClass(); // Initialize with an empty Delta
            this.checkpoints = {}; // For optimized reconstruction
        }

        async addLeaf(delta, metadata) {
            const deltaString = JSON.stringify(delta);
            const deltaHash = await this.computeHash(deltaString);
            const leaf = new MerkleNode(deltaHash, delta, metadata);
            this.leaves.push(leaf);
            await this.applyDelta(delta);
            await this.rebuildTree();
            
            const proof = await this.getProof(this.leaves.length - 1);
            
            // Create a checkpoint every 100 edits
            const checkpointInterval = 100;
            if (this.leaves.length % checkpointInterval === 0) {
                this.checkpoints[this.leaves.length] = this.documentState.ops;
                const rootHash = this.root ? this.root.hash : null;
                if (rootHash) {
                    this.createOpenTimestamp(rootHash).then(timestamp => {
                        this.pendingTimestamps.set(rootHash, timestamp);
                    });
                }
            }
            
            return {
                leaf: leaf,
                proof: proof,
                rootHash: this.root ? this.root.hash : null
            };
        }

        async applyDelta(delta) {
            const quillDelta = new Delta(delta);
            this.documentState = this.documentState.compose(quillDelta);
        }

        getCurrentContent() {
            return this.documentState.ops;
        }

        async rebuildTree() {
            if (this.leaves.length === 0) {
                this.root = null;
                return;
            }

            let nodes = [...this.leaves];
            let level = 0;

            while (nodes.length > 1) {
                const nextLevel = [];
                for (let i = 0; i < nodes.length; i += 2) {
                    const left = nodes[i];
                    const right = i + 1 < nodes.length ? nodes[i + 1] : left;
                    
                    // Await the hash computation
                    const combinedHash = await this.computeHash(left.hash + right.hash);
                    
                    nextLevel.push(new MerkleNode(
                        combinedHash,
                        null,
                        { 
                            timestamp: Date.now(),
                            level,
                            leftHash: left.hash,
                            rightHash: right.hash
                        },
                        left,
                        right
                    ));
                }
                nodes = nextLevel;
                level++;
            }

            this.root = nodes[0];
            console.log('Tree rebuilt. Root hash:', this.root.hash);
        }
    

        async getProof(index) {
            if (!this.root || index >= this.leaves.length) {
                return null;
            }

            const proof = [];
            let currentIndex = index;
            let currentLevel = [...this.leaves];

            while (currentLevel.length > 1) {
                const isOdd = currentIndex % 2 === 1;
                const pairIndex = isOdd ? currentIndex - 1 : currentIndex + 1;
                
                // Add sibling to proof if it exists
                if (pairIndex < currentLevel.length) {
                    proof.push({
                        hash: currentLevel[pairIndex].hash,
                        position: isOdd ? 'left' : 'right'
                    });
                } else if (currentIndex % 2 === 0) {
                    // If we're at a right edge, use self as the pair
                    proof.push({
                        hash: currentLevel[currentIndex].hash,
                        position: 'right'
                    });
                }

                // Build next level
                const nextLevel = [];
                for (let i = 0; i < currentLevel.length; i += 2) {
                    const leftNode = currentLevel[i];
                    const rightNode = i + 1 < currentLevel.length ? currentLevel[i + 1] : leftNode;
                    
                    const combinedHash = await this.computeHash(leftNode.hash + rightNode.hash);
                    
                    nextLevel.push(new MerkleNode(
                        combinedHash,
                        null,
                        {
                            level: Math.floor(currentLevel.length / 2),
                            leftHash: leftNode.hash,
                            rightHash: rightNode.hash
                        },
                        leftNode,
                        rightNode
                    ));
                }

                // Update for next iteration
                currentLevel = nextLevel;
                currentIndex = Math.floor(currentIndex / 2);
            }

            return {
                proof: proof,
                rootHash: this.root.hash,
                metadata: this.leaves[index].metadata
            };
        }

        async verifyProof(index) {
            const proof = await this.getProof(index);
            if (!proof) return { valid: false, timestamp: null };

            // Start with the hash of the delta at the given index
            const entry = this.leaves[index];
            let currentHash = entry.hash;

            console.log('Starting verification:');
            console.log('Initial hash:', currentHash);
            console.log('Expected root:', proof.rootHash);
            console.log('Proof steps:', proof.proof);

            // Apply each step in the proof
            for (const { hash, position } of proof.proof) {
                if (position === 'left') {
                    currentHash = await this.computeHash(hash + currentHash);
                } else {
                    currentHash = await this.computeHash(currentHash + hash);
                }
                console.log(`After ${position} pairing: ${currentHash}`);
            }

            const valid = currentHash === proof.rootHash;
            const timestamp = valid ? await this.verifyOpenTimestamp(proof.rootHash) : null;

            console.log('Verification result:', {
                valid,
                finalHash: currentHash,
                expectedHash: proof.rootHash
            });

            return { valid, timestamp };
        }

        reconstructDocument(upToIndex = this.leaves.length) {
            let reconstructedDelta = new Delta();

            // Find the nearest checkpoint
            const checkpointIndices = Object.keys(this.checkpoints).map(Number).sort((a, b) => a - b);
            let lastCheckpoint = 0;
            for (const idx of checkpointIndices) {
                if (idx <= upToIndex) {
                    reconstructedDelta = new Delta(this.checkpoints[idx]);
                    lastCheckpoint = idx;
                } else {
                    break;
                }
            }

            // Apply deltas from the last checkpoint
            for (let i = lastCheckpoint; i < upToIndex; i++) {
                const delta = new Delta(this.leaves[i].delta);
                reconstructedDelta = reconstructedDelta.compose(delta);
            }

            return reconstructedDelta;
        }

        updateContentDisplay(contentDisplayElement) {
            const reconstructedDelta = this.reconstructDocument();
            const tempQuill = new Quill(document.createElement('div'));
            tempQuill.setContents(reconstructedDelta);
            contentDisplayElement.innerHTML = tempQuill.root.innerHTML || 'No content yet...';
        }

        async computeHash(data) {
            // If the input contains [object Promise], something went wrong
            if (data.includes('[object Promise]')) {
                console.error('Attempted to hash unresolved Promise:', data);
                throw new Error('Attempted to hash unresolved Promise');
            }

            console.log('Computing hash for:', data.slice(0, 100) + '...');
            
            const encoder = new TextEncoder();
            const buffer = encoder.encode(data);
            const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            console.log('Computed hash:', hash);
            return hash;
        }

        async createOpenTimestamp(hash) {
            try {
                const digest = OpenTimestamps.Utils.hexToBytes(hash);
                const detached = OpenTimestamps.DetachedTimestampFile.fromHash(
                    new OpenTimestamps.Ops.OpSHA256(), 
                    digest
                );
                await OpenTimestamps.stamp(detached);
                return Array.from(detached.serializeToBytes());
            } catch (error) {
                console.error('OpenTimestamp creation failed:', error);
                return null;
            }
        }

        async verifyOpenTimestamp(hash) {
            const timestamp = this.pendingTimestamps.get(hash);
            if (!timestamp) return null;

            try {
                const ots = new Uint8Array(timestamp);
                const detached = OpenTimestamps.DetachedTimestampFile.deserialize(ots);
                const verification = await OpenTimestamps.verify(detached);
                return verification ? new Date(verification * 1000) : null;
            } catch (error) {
                console.error('OpenTimestamp verification failed:', error);
                return null;
            }
        }

        getHistory() {
            return this.leaves.map(leaf => ({
                delta: leaf.delta,
                metadata: leaf.metadata,
                hash: leaf.hash,
                timestamp: leaf.metadata.timestamp
            }));
        }

        async serialize() {
            return JSON.stringify({
                leaves: this.leaves.map(leaf => ({
                    delta: leaf.delta,
                    metadata: leaf.metadata,
                    hash: leaf.hash
                })),
                checkpoints: this.checkpoints,
                timestamps: Array.from(this.pendingTimestamps.entries())
            });
        }

        async deserialize(jsonString) {
            const data = JSON.parse(jsonString);
            this.leaves = [];
            
            for (const leafData of data.leaves) {
                const leaf = new MerkleNode(
                    leafData.hash,
                    leafData.delta,
                    leafData.metadata
                );
                this.leaves.push(leaf);
            }

            this.checkpoints = data.checkpoints || {};
            this.pendingTimestamps = new Map(data.timestamps || []);
            this.documentState = new Delta();

            // Reconstruct document state
            for (let i = 0; i < this.leaves.length; i++) {
                await this.applyDelta(this.leaves[i].delta);
            }

            await this.rebuildTree();
            
            return this.root !== null;
        }
    }

    class BitQuillApp {
        constructor() {
            // UI Elements
            this.editorContainer = document.getElementById('editor-container');
            this.newDocBtn = document.getElementById('new-doc-btn');
            this.verifyBtn = document.getElementById('verify-btn');
            this.serializeBtn = document.getElementById('serialize-btn');
            this.deserializeBtn = document.getElementById('deserialize-btn');
            this.timestampBtn = document.getElementById('timestamp-btn');
            this.fileInput = document.getElementById('file-input');
            this.statusDisplay = document.getElementById('status');
            this.spinner = document.getElementById('spinner');
            this.documentHashDisplay = document.getElementById('document-hash');
            this.contentDisplay = document.getElementById('content-display');
            this.serializedDataDisplay = document.getElementById('serialized-data');
            this.proofsList = document.getElementById('proofs-list');

            // Core components
            this.quill = null;
            this.editAnalyzer = new EditAnalyzer();
            this.merkleTree = null; // Will be instantiated after Delta is defined
            this.lastContent = null; // Will be set after initialization
            
            // PoW configuration
            this.powConfig = {
                min: 1,
                max: 32,                    // Increased max difficulty
                current: 1,
                adjustmentInterval: 2016,   // Match Bitcoin's adjustment interval, for spiritual reasons
                targetEditInterval: 200,    // Target typing speed: 200ms per character
                maxAdjustmentFactor: 4,     // Max 4x difficulty change either direction
                // For analyzing typing patterns
                windowSize: 50,             // Rolling window for speed analysis
                minSampleSize: 5            // Minimum samples needed
            };
            
            // Initialize Web Worker for PoW
            this.initializeWebWorker();
        }

        init() {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    this.initializeQuillEditor();
                    this.attachEventListeners();
                    this.initializeDocument();
                });
            } else {
                this.initializeQuillEditor();
                this.attachEventListeners();
                this.initializeDocument();
            }
        }

        initializeQuillEditor() {
            console.log('Initializing Quill editor...');
            try {
                this.quill = new Quill(this.editorContainer, {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            [{ header: [1, 2, 3, false] }],
                            ['bold', 'italic', 'underline'],
                            ['link', 'image'],
                            [{ list: 'ordered' }, { list: 'bullet' }],
                            ['clean']
                        ]
                    }
                });

                // Retrieve Quill's Delta class
                Delta = Quill.import('delta');

                // Instantiate MerkleTree after Delta is defined
                this.merkleTree = new EnhancedMerkleTree(Delta);

                // Initialize lastContent
                this.lastContent = this.quill.getContents();

                this.quill.on('text-change', (delta, oldDelta, source) => {
                    if (source === 'user') {
                        this.handleEdit(delta, oldDelta);
                    }
                });

                console.log('Quill editor initialized successfully');
            } catch (error) {
                console.error('Error initializing Quill editor:', error);
                this.updateStatus('Failed to initialize editor', 'error');
            }
        }

        attachEventListeners() {
            this.newDocBtn.addEventListener('click', () => this.newDocument());
            this.verifyBtn.addEventListener('click', () => this.verifyDocument());
            this.serializeBtn.addEventListener('click', () => this.serializeDocument());
            this.deserializeBtn.addEventListener('click', () => this.fileInput.click());
            this.timestampBtn.addEventListener('click', () => this.manualTimestamp());
            this.fileInput.addEventListener('change', (event) => this.deserializeDocument(event));
        }

        async initializeDocument() {
            try {
                const initialDelta = this.quill.getContents();
                const timestamp = Date.now();
                
                // Initialize with empty delta as previous
                const editAnalysis = this.editAnalyzer.recordEdit(initialDelta, this.lastContent, timestamp);
                
                // Perform initial PoW
                const powResult = await this.performProofOfWork(JSON.stringify(initialDelta), this.powConfig.current);
                
                const merkleResult = await this.merkleTree.addLeaf(initialDelta, {
                    timestamp,
                    editStats: this.editAnalyzer.getEditStats(),
                    powResult: powResult,  // Include PoW result
                    isGenesis: true
                });

                this.lastContent = initialDelta;
                this.updateUIAfterEdit('Document initialized', 'success');
                this.verifyBtn.disabled = false;

                // Update displays
                this.updateDocumentHash(merkleResult.leaf.hash);
                this.updateProofsDisplay();
                this.updateContentDisplay();

            } catch (error) {
                console.error('Document initialization error:', error);
                this.updateStatus(`Initialization failed: ${error.message}`, 'error');
            }
        }

        async handleEdit(delta, oldDelta) {
            const currentDelta = this.quill.getContents();
            const timestamp = Date.now();

            try {
                // Analyze edit patterns using delta information
                const editAnalysis = this.editAnalyzer.recordEdit(delta, this.lastContent, timestamp);
                
                if (!editAnalysis.isValid) {
                    throw new Error(`Suspicious edit pattern: ${editAnalysis.patterns.join(', ')}`);
                }

                // Perform proof of work on the delta
                const powResult = await this.performProofOfWork(JSON.stringify(delta), this.powConfig.current);

                // Add delta to Merkle tree with metadata
                const merkleResult = await this.merkleTree.addLeaf(delta, {
                    timestamp,
                    editStats: this.editAnalyzer.getEditStats(),
                    powResult: powResult
                });

                this.lastContent = currentDelta;
                
                // Adjust PoW difficulty
                if (this.editAnalyzer.getEditStats().totalEdits % this.powConfig.adjustmentInterval === 0) {
                    this.adjustPowDifficulty();
                }

                // Update UI
                this.updateUIAfterEdit('Edit recorded successfully', 'success');
                this.updateDocumentHash(merkleResult.leaf.hash);
                this.updateProofsDisplay();
                this.updateContentDisplay();

            } catch (error) {
                console.error('Edit processing error:', error);
                this.updateStatus(error.message, 'error');
            }
        }

        initializeWebWorker() {
            const workerScript = `
                self.addEventListener('message', async (event) => {
                    const { content, difficulty } = event.data;
                    const startTime = Date.now(); // Record start time
                    let nonce = 0;
                    const target = '0'.repeat(difficulty);

                    while (true) {
                        const combined = \`\${content}\${nonce}\`;
                        const encoder = new TextEncoder();
                        const data = encoder.encode(combined);
                        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                        const hashArray = Array.from(new Uint8Array(hashBuffer));
                        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                        if (hashHex.startsWith(target)) {
                            const duration = Date.now() - startTime; // Calculate duration
                            self.postMessage({ 
                                type: 'POW_RESULT', 
                                nonce: nonce, 
                                hash: hashHex,
                                duration: duration // Include duration
                            });
                            break;
                        }

                        nonce++;

                        if (nonce % 1000 === 0) {
                            await new Promise(resolve => setTimeout(resolve, 0));
                        }

                        if (nonce === Number.MAX_SAFE_INTEGER) {
                            self.postMessage({ 
                                type: 'POW_ERROR', 
                                message: 'Maximum nonce reached' 
                            });
                            break;
                        }
                    }
                });
            `;

            const blob = new Blob([workerScript], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            this.worker = new Worker(workerUrl);
        }

        async performProofOfWork(content, difficulty) {
            return new Promise((resolve, reject) => {
                this.worker.onmessage = (event) => {
                    const { type, nonce, hash, duration, message } = event.data;
                    if (type === 'POW_RESULT') {
                        resolve({ nonce, hash, duration }); // Include duration
                    } else if (type === 'POW_ERROR') {
                        reject(new Error(message));
                    }
                };

                this.worker.postMessage({ 
                    content, 
                    difficulty
                });
            });
        }

        adjustPowDifficulty() {
            const stats = this.editAnalyzer.getEditStats();
            if (!stats || stats.totalEdits % this.powConfig.adjustmentInterval !== 0) {
                return;
            }

            // Get geometric mean of recent typing speeds
            const recentIntervals = this.editAnalyzer.intervalHistory
                .slice(-this.powConfig.windowSize)
                .filter(interval => interval > 0);

            if (recentIntervals.length < this.powConfig.minSampleSize) {
                return;
            }

            // Calculate geometric mean
            const logSum = recentIntervals.reduce((sum, interval) => 
                sum + Math.log(interval), 0);
            const geometricMean = Math.exp(logSum / recentIntervals.length);

            // Calculate adjustment factor
            let adjustmentFactor = this.powConfig.targetEditInterval / geometricMean;

            // Limit adjustment to maxAdjustmentFactor
            adjustmentFactor = Math.min(
                Math.max(
                    adjustmentFactor,
                    1 / this.powConfig.maxAdjustmentFactor
                ),
                this.powConfig.maxAdjustmentFactor
            );

            // Calculate new difficulty
            let newDifficulty = Math.round(this.powConfig.current * adjustmentFactor);
            newDifficulty = Math.max(
                this.powConfig.min,
                Math.min(this.powConfig.max, newDifficulty)
            );

            if (newDifficulty !== this.powConfig.current) {
                this.powConfig.current = newDifficulty;
                this.updateStatus(
                    `Difficulty adjusted to ${this.powConfig.current} ` +
                    `(mean interval: ${Math.round(geometricMean)}ms)`,
                    'info'
                );
            }
        }

        async manualTimestamp() {
            const currentContent = this.merkleTree.getCurrentContent();
            const contentHash = await this.merkleTree.computeHash(JSON.stringify(currentContent));
            
            this.updateStatus('Creating manual timestamp...', 'info');
            const timestamp = await this.merkleTree.createOpenTimestamp(contentHash);
            
            if (timestamp) {
                this.updateStatus('Manual timestamp created successfully', 'success');
                this.updateProofsDisplay();
            } else {
                this.updateStatus('Failed to create timestamp', 'error');
            }
        }

        async newDocument() {
            this.quill.setText('');
            this.merkleTree = new EnhancedMerkleTree(Delta);
            this.editAnalyzer = new EditAnalyzer();
            this.lastContent = this.quill.getContents();
            this.powConfig.current = this.powConfig.min;

            await this.initializeDocument();
            this.updateUIAfterEdit('New document created', 'success');
            this.updateDocumentHash('');
            this.updateProofsDisplay();
            this.updateContentDisplay();
        }

        async serializeDocument() {
            try {
                this.disableUI();
                this.updateStatus('Serializing document...', 'info');
                this.spinner.style.display = 'inline-block';

                const serialized = await this.merkleTree.serialize();
                const blob = new Blob([serialized], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `bitquill_document_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);

                this.serializedDataDisplay.textContent = serialized;
                this.updateStatus('Document serialized successfully', 'success');
            } catch (error) {
                console.error('Serialization error:', error);
                this.updateStatus(`Serialization failed: ${error.message}`, 'error');
            } finally {
                this.spinner.style.display = 'none';
                this.enableUI();
            }
        }

        async deserializeDocument(event) {
            const file = event.target.files[0];
            if (!file) {
                this.updateStatus('No file selected', 'error');
                return;
            }

            try {
                this.disableUI();
                this.updateStatus('Deserializing document...', 'info');
                this.spinner.style.display = 'inline-block';

                const content = await file.text();
                const success = await this.merkleTree.deserialize(content);
                
                if (success) {
                    const history = this.merkleTree.getHistory();
                    if (history.length > 0) {
                        const reconstructedDelta = this.merkleTree.reconstructDocument();
                        this.quill.setContents(reconstructedDelta, 'silent');
                        this.lastContent = reconstructedDelta;
                    }

                    this.updateStatus('Document deserialized successfully', 'success');
                    this.updateUIAfterEdit('Document loaded', 'success');

                    // **Update the UI sections**
                    this.updateProofsDisplay();
                    this.updateContentDisplay();
                } else {
                    throw new Error('Failed to deserialize document');
                }
            } catch (error) {
                console.error('Deserialization error:', error);
                this.updateStatus(`Deserialization failed: ${error.message}`, 'error');
            } finally {
                this.spinner.style.display = 'none';
                this.enableUI();
                this.fileInput.value = '';
            }
        }

        async verifyDocument() {
            try {
                this.disableUI();
                this.updateStatus('Verifying document...', 'info');
                this.spinner.style.display = 'inline-block';

                const history = this.merkleTree.getHistory();
                let verifiedTimestamps = 0;

                for (let i = 0; i < history.length; i++) {
                    const entry = history[i];
                    const proof = await this.merkleTree.getProof(i);  // Use index directly
                    
                    if (!proof) {
                        this.updateStatus(`Verification failed: Missing proof for edit ${i + 1}`, 'error');
                        return;
                    }

                    const verification = await this.merkleTree.verifyProof(i);
                    
                    if (!verification.valid) {
                        this.updateStatus(`Verification failed at edit ${i + 1}`, 'error');
                        return;
                    }

                    if (verification.timestamp) {
                        verifiedTimestamps++;
                    }
                }

                const message = verifiedTimestamps > 0 ?
                    `Document verified with ${verifiedTimestamps} timestamp(s)` :
                    'Document verified (no timestamps yet)';
                this.updateStatus(message, 'success');

            } catch (error) {
                console.error('Verification error:', error);
                this.updateStatus(`Verification failed: ${error.message}`, 'error');
            } finally {
                this.spinner.style.display = 'none';
                this.enableUI();
            }
        }

        updateUIAfterEdit(message, type) {
            this.updateStatus(message, type);
        }

        updateStatus(message, type) {
            this.statusDisplay.textContent = message;
            this.statusDisplay.className = `status ${type}`;
        }

        updateDocumentHash(hash) {
            this.documentHashDisplay.textContent = hash || 'No hash yet...';
        }

        updateProofsDisplay() {
            const history = this.merkleTree.getHistory();
            this.proofsList.innerHTML = history.map((entry, index) => `
                <li class="p-2 bg-gray-100 rounded">
                    <div><strong>Edit ${index + 1}</strong></div>
                    <div>Time: ${new Date(entry.metadata.timestamp).toISOString()}</div>
                    <div>Hash: ${entry.hash.substring(0, 8)}...</div>
                    ${entry.metadata.powResult ? `
                        <div>PoW: Nonce=${entry.metadata.powResult.nonce}</div>
                        <div>Duration: ${entry.metadata.powResult.duration ? entry.metadata.powResult.duration.toFixed(2) + 'ms' : 'N/A'}</div>
                    ` : ''}
                    ${entry.metadata.editStats ? `
                        <div>Typing Analysis:</div>
                        <div>• Speed: ${entry.metadata.editStats.charsPerMinute !== undefined ? entry.metadata.editStats.charsPerMinute.toFixed(2) + ' chars/min' : 'N/A'}</div>
                        <div>• Mean Interval: ${entry.metadata.editStats.geometricMeanInterval !== null && entry.metadata.editStats.geometricMeanInterval !== undefined ? entry.metadata.editStats.geometricMeanInterval.toFixed(2) + ' ms' : 'N/A'}</div>
                        <div>• Total Edits: ${entry.metadata.editStats.totalEdits !== undefined ? entry.metadata.editStats.totalEdits : 'N/A'}</div>
                    ` : ''}
                </li>
            `).join('');
        }

        updateContentDisplay() {
            this.merkleTree.updateContentDisplay(this.contentDisplay);
        }

        disableUI() {
            this.verifyBtn.disabled = true;
            this.serializeBtn.disabled = true;
            this.deserializeBtn.disabled = true;
            this.timestampBtn.disabled = true;
            this.newDocBtn.disabled = true;
        }

        enableUI() {
            this.verifyBtn.disabled = false;
            this.serializeBtn.disabled = false;
            this.deserializeBtn.disabled = false;
            this.timestampBtn.disabled = false;
            this.newDocBtn.disabled = false;
        }
    }

    // Initialize the BitQuill application
    document.addEventListener('DOMContentLoaded', () => {
        console.log('Initializing BitQuill...');
        try {
            const app = new BitQuillApp();
            app.init();
            console.log('BitQuill initialized successfully');
        } catch (error) {
            console.error('BitQuill initialization error:', error);
            document.getElementById('status').textContent = 
                'Failed to initialize BitQuill. Check console for details.';
            document.getElementById('status').className = 'status error';
        }
    });
    </script>

</body>
